name: Update news daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest

    steps:
      - name: Approve build scripts
  run: pnpm approve-builds @tailwindcss/oxide esbuild

- name: Install dependencies
  run: pnpm install


      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install dependencies and allow builds
  run: pnpm install --only-built-dependencies=@tailwindcss/oxide --only-built-dependencies=esbuild


      - name: Generate fresh news data
        run: pnpm run generate:news

      - name: Commit updated news file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          if git diff --cached --quiet; then
            echo "No news updates to commit"
          else
            git commit -m "chore: update daily news from G1"
            git push
          fi