name: Update news daily

on:
  schedule:
    # 06:00 Brasília = 09:00 UTC
    - cron: '0 9 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm


      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9


      - name: Check versions
        run: |
          node -v
          pnpm -v


      - name: Configure pnpm build permissions
  run: |
    pnpm config set enable-pre-post-scripts true
    pnpm approve-builds --all || true

- name: Install dependencies
  run: pnpm install


      - name: Generate fresh news data
        run: |
          pnpm run generate:news


      - name: Commit updated news file
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/news.json

          if git diff --cached --quiet; then
            echo "Nenhuma notícia nova encontrada"
            exit 0
          fi

          git commit -m "chore: update daily news"

          git push origin HEAD:${{ github.ref_name }}