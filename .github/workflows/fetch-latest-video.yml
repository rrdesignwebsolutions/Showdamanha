name: Fetch Latest Video

on:
  schedule:
    # Roda uma vez por dia às 11h15 (UTC-3: 14h15 em UTC) para pegar a live do dia completa
    - cron: '15 14 * * *'
  workflow_dispatch: # Permite executar manualmente

jobs:
  fetch-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest video
        run: node scripts/fetch-latest-video.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet public/latest-video.json; then
            echo "No changes detected"
          else
            echo "Changes detected, committing..."
            git add public/latest-video.json
            git commit -m "chore: update latest video [automated]"
            git push
          fi