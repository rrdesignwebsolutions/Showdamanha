name: Build and Deploy Site

on:
  schedule:
    # 03h00 (Brasília) = 06h00 UTC -> atualiza notícias
    - cron: '0 6 * * *'
    # 11h15 (Brasília) = 14h15 UTC -> roda logo após a live terminar (11h),
    # pega o vídeo gravado do dia e também atualiza as notícias de novo
    - cron: '15 14 * * *'
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (busca notícias, vídeo e gera o build final)
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
